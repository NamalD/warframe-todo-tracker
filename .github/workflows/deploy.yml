name: Deploy

on:
  workflow_run:
    workflows: ["Test Suite"]
    branches: [main]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/namald/warframe-todo-tracker:latest
            ghcr.io/namald/warframe-todo-tracker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Deployment is pull-based: Watchtower on the VPS polls GHCR and
      # restarts the app container when a new :latest image is pushed.
      # See AGENTS.md "Deployment" for the one-time VPS setup.
