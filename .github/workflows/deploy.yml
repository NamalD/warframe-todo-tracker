name: Deploy

on:
  workflow_run:
    workflows: ["Test Suite"]
    branches: [main]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          env:
            PASSWORD: ${{ secrets.PASSWORD }}
            SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          script: |
            set -e

            # Export secrets for docker compose
            export PASSWORD
            export SESSION_SECRET

            # Create directory if it doesn't exist (first deploy)
            mkdir -p /home/${{ secrets.VPS_USER }}/warframe-todo-tracker

            cd /home/${{ secrets.VPS_USER }}/warframe-todo-tracker

            # Configure git for automated operations
            git config user.email "actions@github.com"
            git config user.name "GitHub Actions"

            # Ensure repo exists, clone if needed (first deploy)
            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }} .
            fi

            # Pull latest code to get updated docker-compose.yml
            git fetch origin
            git reset --hard origin/main

            # Deploy the updated compose file
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f