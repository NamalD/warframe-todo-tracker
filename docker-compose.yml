services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/namald/warframe-todo-tracker:latest
    container_name: warframe-todo-tracker
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      - PASSWORD=${PASSWORD:-}
      - SESSION_SECRET=${SESSION_SECRET:-}
    volumes:
      - ./data:/app/data
    labels:
      - "app=warframe-todo-tracker"
      - "stack=warframe"
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # GHCR credentials for pulling the private image (from `docker login ghcr.io`).
      # Remove this mount if the GHCR package is made public.
      - ${DOCKER_CONFIG:-~/.docker}/config.json:/config.json:ro
    # Only watch containers with the watchtower.enable label, poll every 60s,
    # and remove superseded images after updating.
    command: --label-enable --interval 60 --cleanup
