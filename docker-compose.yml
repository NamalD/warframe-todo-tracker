services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/namald/warframe-todo-tracker:latest
    container_name: warframe-todo-tracker
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      - PASSWORD=${PASSWORD:-}
      - SESSION_SECRET=${SESSION_SECRET:-}
    volumes:
      - ./data:/app/data
    labels:
      - "app=warframe-todo-tracker"
      - "stack=warframe"
