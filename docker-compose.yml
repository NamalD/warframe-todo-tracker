services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/namald/warframe-todo-tracker:latest
    container_name: warframe-todo-tracker
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      - PASSWORD=${PASSWORD:-}
      - SESSION_SECRET=${SESSION_SECRET:-}
    volumes:
      - /home/namal/apps/dbs/warframe-todo-tracker:/app/data
    labels:
      - "app=warframe-todo-tracker"
      - "stack=warframe"
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --label-enable --interval 60 --cleanup
